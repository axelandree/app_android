<div class="juego-container">

  <div class="top">
   <!-- tiempo -->
    <div class="contenedor-tiempo">
      <span>⏱️</span>
      <div class="barra-tiempo">
        <div class="progreso" [style.width.%]="(tiempo / tiempoMax) * 100"></div>
      </div>
    </div>

    <h3>🎯 Nivel: {{ nivel }}</h3>

    <div class="stats">
      <span>⭐ {{ puntaje }}</span>
      <span>❤️ {{ vidas }}</span>
    </div>
  </div>

  <div class="center">
    <h2>{{ numero1 }} + {{ numero2 }} = ?</h2>
  </div>

  <div class="bottom">
    <div class="input-ios" (click)="focusInput()">
      <label position="stacked">Tu respuesta</label>
      <input
        #respuestaInput
        type="text"
        autofocus
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        [ngModel]="respuestaUsuario"
        (ngModelChange)="onInputChange($event)">
    </div>

    <ion-button class="btn-pro" (click)="validar.emit()">
      Validar
    </ion-button>

    <ion-button class="btn-pro btn-secundario" (click)="pausar.emit()">
      Pausar
    </ion-button>
  </div>

</div>
