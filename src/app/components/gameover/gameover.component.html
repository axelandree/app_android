<div class="overlay-gameover overlay-base">
  <div class="card-gameover">

    <h1 class="titulo-gameover">💀 Game Over</h1>

    <h2 *ngIf="esNuevoRecord" class="nuevo-record">
      🏆 ¡Nuevo récord!
    </h2>

    <p class="puntaje-final">
      ⭐ Puntaje final: {{ puntaje }}
    </p>

    <div *ngIf="esNuevoRecord">
      <div class="input-ios">
        <label>👤 Tu nombre</label>

        <ion-input
          [value]="nombreJugador"
          (ionInput)="onNombreChange($event.detail.value)"
          placeholder="Escribe tu nombre"
          clear-input="true">
        </ion-input>
      </div>

      <ion-button expand="full" class="btn-pro" (click)="guardar.emit()">
        💾 Guardar y jugar
      </ion-button>
    </div>

    <div *ngIf="!esNuevoRecord">
      <p>No entraste al ranking 😢</p>
    </div>

    <ion-button expand="full" class="btn-pro btn-secundario" (click)="reiniciar.emit()">
      🔁 Reintentar
    </ion-button>

  </div>
</div>
